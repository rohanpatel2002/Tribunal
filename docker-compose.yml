version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tribunal_db
    restart: always
    environment:
      POSTGRES_USER: tribunal
      POSTGRES_PASSWORD: tribunal_password_dev
      POSTGRES_DB: tribunal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/postgres.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./schema/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tribunal -d tribunal_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  interceptor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tribunal_interceptor
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tribunal}:${POSTGRES_PASSWORD:-tribunal_password_dev}@db:5432/tribunal_db?sslmode=disable
      PORT: "8080"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TRIBUNAL_API_KEY: ${TRIBUNAL_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: tribunal_dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - interceptor

volumes:
  postgres_data:
